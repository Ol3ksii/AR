# configs/default_config.yaml

paths:
  data_raw: "data/raw"
  data_proc: "data/processed"
  results: "results"

preprocessing:
  min_user_interactions: 5
  min_sub_interactions: 10
  exclude_over18: true
  top_k_subreddits: 1000
  test_ratio: 0.2
  random_seed: 42

environment:
  episode_length: 20
  history_length: 5
  repeat_penalty: 0.5
  diversity_bonus: 0.1

agents:
  dqn:
      n_train_episodes: 20000
      lr: 0.0001
      gamma: 0.95
      batch_size: 512
      buffer_size: 50000
      target_update: 500
      hidden_dim: 128
      embed_dim: 128